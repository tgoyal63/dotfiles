add_newline = true

# Context on top, input on the next line.
format = "$directory$git_branch$git_status$python$line_break$character"

right_format = "$cmd_duration$time"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[directory]
style = "bold blue"
truncation_length = 1 # Shows only the current folder name if path is long
truncate_to_repo = true

[git_branch]
format = "[$branch]($style) "
style = "bold purple"

[git_status]
format = "([$all_status$ahead_behind]($style) )"
style = "bold green"

[python]
symbol = "🐍 "
format = '[(\($virtualenv\))]($style) '
style = "bold yellow"

[time]
disabled = false
format = "[$time]($style)"
style = "dim bold white"
time_format = "%H:%M"

[cmd_duration]
min_time = 500
format = "took [$duration]($style) "
